<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MeLi Tracker{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="nav-logo">
            <span class="logo-icon">◈</span> MeLi Tracker
        </a>
        <div class="nav-links">
            <a href="{{ url_for('index') }}" class="nav-link">Buscar</a>
            <a href="{{ url_for('ver_monitoreados') }}" class="nav-link">Monitoreados</a>
        </div>
    </nav>

    <!-- Mensajes flash (errores y confirmaciones) -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="flash-container">
                {% for message in messages %}
                    <div class="flash-message">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>MeLi Tracker — precios en tiempo real de MercadoLibre Argentina</p>
    </footer>

</body>
</html>
